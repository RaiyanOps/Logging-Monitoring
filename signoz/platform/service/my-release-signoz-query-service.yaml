kind: Service
apiVersion: v1
metadata:
  name: szlog-signoz-query-service
  namespace: platform
  labels:
    app.kubernetes.io/component: query-service
    app.kubernetes.io/instance: szlog
    app.kubernetes.io/name: signoz
    app.kubernetes.io/version: 0.52.0
    helm.sh/chart: signoz-0.50.0
  annotations:
    meta.helm.sh/release-name: szlog
    meta.helm.sh/release-namespace: platform
spec:
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: http
    - name: http-internal
      protocol: TCP
      port: 8085
      targetPort: http-internal
    - name: opamp-internal
      protocol: TCP
      port: 4320
      targetPort: opamp-internal
  selector:
    app.kubernetes.io/component: query-service
    app.kubernetes.io/instance: szlog
    app.kubernetes.io/name: signoz
  type: NodePort
  sessionAffinity: None
  externalTrafficPolicy: Cluster
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  internalTrafficPolicy: Cluster

