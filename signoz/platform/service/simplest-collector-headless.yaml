kind: Service
apiVersion: v1
metadata:
  name: simplest-collector-headless
  namespace: platform
  labels:
    app.kubernetes.io/component: opentelemetry-collector
    app.kubernetes.io/instance: platform.simplest
    app.kubernetes.io/managed-by: opentelemetry-operator
    app.kubernetes.io/name: simplest-collector
    app.kubernetes.io/part-of: opentelemetry
    app.kubernetes.io/version: latest
    operator.opentelemetry.io/collector-headless-service: Exists
  annotations:
    kubectl.kubernetes.io/last-applied-configuration: >
      {"apiVersion":"opentelemetry.io/v1alpha1","kind":"OpenTelemetryCollector","metadata":{"annotations":{},"name":"simplest","namespace":"platform"},"spec":{"config":"receivers:\n 
      otlp:\n    protocols:\n      grpc:\n      http:\nprocessors:\n 
      batch:\nexporters:\n  logging:\nservice:\n  pipelines:\n    traces:\n     
      receivers: [otlp]\n      processors: [batch]\n      exporters:
      [logging]\n","mode":"deployment"}}
    service.beta.openshift.io/serving-cert-secret-name: simplest-collector-headless-tls
spec:
  ports:
    - name: otlp-grpc
      protocol: TCP
      appProtocol: grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      protocol: TCP
      appProtocol: http
      port: 4318
      targetPort: 4318
  selector:
    app.kubernetes.io/component: opentelemetry-collector
    app.kubernetes.io/instance: platform.simplest
    app.kubernetes.io/managed-by: opentelemetry-operator
    app.kubernetes.io/part-of: opentelemetry
  clusterIP: None
  clusterIPs:
    - None
  type: ClusterIP
  sessionAffinity: None
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  internalTrafficPolicy: Cluster

