kind: Deployment
apiVersion: apps/v1
metadata:
  name: szlog-signoz-otel-collector
  namespace: platform
  labels:
    app.kubernetes.io/component: otel-collector
    app.kubernetes.io/instance: szlog
    app.kubernetes.io/name: signoz
    app.kubernetes.io/version: 0.52.0
    helm.sh/chart: signoz-0.50.0
  annotations:
    deployment.kubernetes.io/revision: '1'
    helm.sh/hook-weight: '3'
    meta.helm.sh/release-name: szlog
    meta.helm.sh/release-namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: otel-collector
      app.kubernetes.io/instance: szlog
      app.kubernetes.io/name: signoz
  template:
    metadata:
      creationTimestamp: null
      labels:
        app.kubernetes.io/component: otel-collector
        app.kubernetes.io/instance: szlog
        app.kubernetes.io/name: signoz
      annotations:
        checksum/config: 931549d8c1cf3d95d5518bdaeb012aba42946197b2045e7ab5872a96f182c318
        signoz.io/port: '8888'
        signoz.io/scrape: 'true'
    spec:
      volumes:
        - name: otel-collector-config-vol
          configMap:
            name: szlog-signoz-otel-collector
            defaultMode: 420
      initContainers:
        - name: szlog-signoz-otel-collector-migrate-init
          image: 'docker.io/groundnuty/k8s-wait-for:v2.0'
          args:
            - job
            - szlog-signoz-schema-migrator-init
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      containers:
        - name: collector
          image: 'docker.io/signoz/signoz-otel-collector:0.102.4'
          command:
            - /signoz-collector
          args:
            - '--config=/conf/otel-collector-config.yaml'
            - '--manager-config=/conf/otel-collector-opamp-config.yaml'
            - '--copy-path=/var/tmp/collector-config.yaml'
            - '--feature-gates=-pkg.translator.prometheus.NormalizeName'
          ports:
            - name: jaeger-grpc
              containerPort: 14250
              protocol: TCP
            - name: jaeger-thrift
              containerPort: 14268
              protocol: TCP
            - name: logsheroku
              containerPort: 8081
              protocol: TCP
            - name: logsjson
              containerPort: 8082
              protocol: TCP
            - name: metrics
              containerPort: 8888
              protocol: TCP
            - name: otlp
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          env:
            - name: CLICKHOUSE_HOST
              value: szlog-clickhouse
            - name: CLICKHOUSE_PORT
              value: '9000'
            - name: CLICKHOUSE_HTTP_PORT
              value: '8123'
            - name: CLICKHOUSE_CLUSTER
              value: cluster
            - name: CLICKHOUSE_DATABASE
              value: signoz_metrics
            - name: CLICKHOUSE_TRACE_DATABASE
              value: signoz_traces
            - name: CLICKHOUSE_LOG_DATABASE
              value: signoz_logs
            - name: CLICKHOUSE_USER
              value: admin
            - name: CLICKHOUSE_PASSWORD
              value: 27ff0399-0d3a-4bd8-919d-17c2181e6fb9
            - name: CLICKHOUSE_SECURE
              value: 'false'
            - name: CLICKHOUSE_VERIFY
              value: 'false'
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: K8S_POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: K8S_HOST_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.hostIP
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: K8S_POD_UID
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.uid
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: K8S_CLUSTER_NAME
            - name: SIGNOZ_COMPONENT
              value: otel-collector
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: >-
                signoz.component=$(SIGNOZ_COMPONENT),k8s.cluster.name=$(K8S_CLUSTER_NAME),k8s.pod.uid=$(K8S_POD_UID),k8s.pod.ip=$(K8S_POD_IP)
            - name: LOW_CARDINAL_EXCEPTION_GROUPING
              value: 'false'
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
          volumeMounts:
            - name: otel-collector-config-vol
              mountPath: /conf
          livenessProbe:
            httpGet:
              path: /
              port: 13133
              scheme: HTTP
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: 13133
              scheme: HTTP
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 6
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: szlog-signoz-otel-collector
      serviceAccount: szlog-signoz-otel-collector
      securityContext: {}
      schedulerName: default-scheduler
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: otel-collector
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  minReadySeconds: 5
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 120
