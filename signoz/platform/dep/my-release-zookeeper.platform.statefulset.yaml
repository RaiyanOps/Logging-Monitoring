kind: StatefulSet
apiVersion: apps/v1
metadata:
  name: szlog-zookeeper
  namespace: platform
  labels:
    app.kubernetes.io/component: zookeeper
    app.kubernetes.io/instance: szlog
    app.kubernetes.io/name: zookeeper
    helm.sh/chart: zookeeper-11.4.2
    role: zookeeper
  annotations:
    meta.helm.sh/release-name: szlog
    meta.helm.sh/release-namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: zookeeper
      app.kubernetes.io/instance: szlog
      app.kubernetes.io/name: zookeeper
  template:
    metadata:
      creationTimestamp: null
      labels:
        app.kubernetes.io/component: zookeeper
        app.kubernetes.io/instance: szlog
        app.kubernetes.io/name: zookeeper
        helm.sh/chart: zookeeper-11.4.2
      annotations:
        signoz.io/path: /metrics
        signoz.io/port: '9141'
        signoz.io/scrape: 'true'
    spec:
      volumes:
        - name: scripts
          configMap:
            name: szlog-zookeeper-scripts
            defaultMode: 493
      containers:
        - name: zookeeper
          image: 'public.ecr.aws/bitnami/zookeeper:3.7.1'
          command:
            - /scripts/setup.sh
          ports:
            - name: client
              containerPort: 2181
              protocol: TCP
            - name: follower
              containerPort: 2888
              protocol: TCP
            - name: election
              containerPort: 3888
              protocol: TCP
            - name: metrics
              containerPort: 9141
              protocol: TCP
          env:
            - name: BITNAMI_DEBUG
              value: 'false'
            - name: ZOO_DATA_LOG_DIR
            - name: ZOO_PORT_NUMBER
              value: '2181'
            - name: ZOO_TICK_TIME
              value: '2000'
            - name: ZOO_INIT_LIMIT
              value: '10'
            - name: ZOO_SYNC_LIMIT
              value: '5'
            - name: ZOO_PRE_ALLOC_SIZE
              value: '65536'
            - name: ZOO_SNAPCOUNT
              value: '100000'
            - name: ZOO_MAX_CLIENT_CNXNS
              value: '60'
            - name: ZOO_4LW_COMMANDS_WHITELIST
              value: 'srvr, mntr, ruok'
            - name: ZOO_LISTEN_ALLIPS_ENABLED
              value: 'no'
            - name: ZOO_AUTOPURGE_INTERVAL
              value: '1'
            - name: ZOO_AUTOPURGE_RETAIN_COUNT
              value: '3'
            - name: ZOO_MAX_SESSION_TIMEOUT
              value: '40000'
            - name: ZOO_SERVERS
              value: >-
                szlog-zookeeper-0.szlog-zookeeper-headless.platform.svc.cluster.local:2888:3888::1
            - name: ZOO_ENABLE_AUTH
              value: 'no'
            - name: ZOO_ENABLE_QUORUM_AUTH
              value: 'no'
            - name: ZOO_HEAP_SIZE
              value: '1024'
            - name: ZOO_LOG_LEVEL
              value: INFO
            - name: ALLOW_ANONYMOUS_LOGIN
              value: 'yes'
            - name: ZOO_ENABLE_PROMETHEUS_METRICS
              value: 'yes'
            - name: ZOO_PROMETHEUS_METRICS_PORT_NUMBER
              value: '9141'
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts/setup.sh
              subPath: setup.sh
            - name: data
              mountPath: /bitnami/zookeeper
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - '-c'
                - 'curl -s -m 2 http://localhost:8080/commands/ruok | grep ruok'
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - '-c'
                - >-
                  curl -s -m 2 http://localhost:8080/commands/ruok | grep error
                  | grep null
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 6
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: default
      serviceAccount: default
      securityContext:
        fsGroup: 1001
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: zookeeper
                    app.kubernetes.io/instance: szlog
                    app.kubernetes.io/name: zookeeper
                topologyKey: kubernetes.io/hostname
      schedulerName: default-scheduler
  volumeClaimTemplates:
    - kind: PersistentVolumeClaim
      apiVersion: v1
      metadata:
        name: data
        creationTimestamp: null
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 8Gi
        volumeMode: Filesystem
      status:
        phase: Pending
  serviceName: szlog-zookeeper-headless
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  revisionHistoryLimit: 10
