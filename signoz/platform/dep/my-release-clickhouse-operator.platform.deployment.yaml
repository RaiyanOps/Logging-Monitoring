kind: Deployment
apiVersion: apps/v1
metadata:
  name: szlog-clickhouse-operator
  namespace: platform
  labels:
    app.kubernetes.io/component: operator
    app.kubernetes.io/instance: szlog
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/version: 24.1.2
    clickhouse.altinity.com/app: chop
    clickhouse.altinity.com/chop: 0.21.2
    clickhouse.altinity.com/chop-commit: 19d8376
    clickhouse.altinity.com/chop-date: 2023-06-29T12.45.30
    helm.sh/chart: clickhouse-24.1.6
  annotations:
    deployment.kubernetes.io/revision: '1'
    helm.sh/hook-weight: '-5'
    meta.helm.sh/release-name: szlog
    meta.helm.sh/release-namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: operator
      app.kubernetes.io/instance: szlog
      app.kubernetes.io/name: clickhouse
  template:
    metadata:
      creationTimestamp: null
      labels:
        app.kubernetes.io/component: operator
        app.kubernetes.io/instance: szlog
        app.kubernetes.io/name: clickhouse
      annotations:
        checksum/confd-files: 155e91c96b1afae40cf31c56336bff7cfadc118c3f83187edbadf458344a2b75
        checksum/configd-files: 602dcf12a1d656117ac874b2856c692a473a0aa8912b30d76436693eedb56fce
        checksum/files: 7a6fbd762fe9b10356a88456793c78569f8d769788ffcdd7983e4e30fafd6bd3
        checksum/templatesd-files: 940ee7b2bb9b9323cd207425c61fa4ba0e62936a4aa90fbed523e8fcda499402
        checksum/usersd-files: a6968f1654abe53e9bb65f09d74600977f81d88ce0037da019999b4318563bfd
        signoz.io/port: '8888'
        signoz.io/scrape: 'true'
    spec:
      volumes:
        - name: etc-clickhouse-operator-folder
          configMap:
            name: szlog-clickhouse-operator-etc-files
            defaultMode: 420
        - name: etc-clickhouse-operator-confd-folder
          configMap:
            name: szlog-clickhouse-operator-etc-confd-files
            defaultMode: 420
        - name: etc-clickhouse-operator-configd-folder
          configMap:
            name: szlog-clickhouse-operator-etc-configd-files
            defaultMode: 420
        - name: etc-clickhouse-operator-templatesd-folder
          configMap:
            name: szlog-clickhouse-operator-etc-templatesd-files
            defaultMode: 420
        - name: etc-clickhouse-operator-usersd-folder
          configMap:
            name: szlog-clickhouse-operator-etc-usersd-files
            defaultMode: 420
      containers:
        - name: szlog-clickhouse-operator
          image: 'docker.io/altinity/clickhouse-operator:0.21.2'
          env:
            - name: OPERATOR_POD_NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: OPERATOR_POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: OPERATOR_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: OPERATOR_POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: OPERATOR_POD_SERVICE_ACCOUNT
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.serviceAccountName
            - name: OPERATOR_CONTAINER_CPU_REQUEST
              valueFrom:
                resourceFieldRef:
                  containerName: szlog-clickhouse-operator
                  resource: requests.cpu
                  divisor: '0'
            - name: OPERATOR_CONTAINER_CPU_LIMIT
              valueFrom:
                resourceFieldRef:
                  containerName: szlog-clickhouse-operator
                  resource: limits.cpu
                  divisor: '0'
            - name: OPERATOR_CONTAINER_MEM_REQUEST
              valueFrom:
                resourceFieldRef:
                  containerName: szlog-clickhouse-operator
                  resource: requests.memory
                  divisor: '0'
            - name: OPERATOR_CONTAINER_MEM_LIMIT
              valueFrom:
                resourceFieldRef:
                  containerName: szlog-clickhouse-operator
                  resource: limits.memory
                  divisor: '0'
          resources: {}
          volumeMounts:
            - name: etc-clickhouse-operator-folder
              mountPath: /etc/clickhouse-operator
            - name: etc-clickhouse-operator-confd-folder
              mountPath: /etc/clickhouse-operator/conf.d
            - name: etc-clickhouse-operator-configd-folder
              mountPath: /etc/clickhouse-operator/config.d
            - name: etc-clickhouse-operator-templatesd-folder
              mountPath: /etc/clickhouse-operator/templates.d
            - name: etc-clickhouse-operator-usersd-folder
              mountPath: /etc/clickhouse-operator/users.d
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
        - name: szlog-clickhouse-metrics-exporter
          image: 'docker.io/altinity/metrics-exporter:0.21.2'
          ports:
            - name: metrics
              containerPort: 8888
              protocol: TCP
          env:
            - name: OPERATOR_POD_NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: OPERATOR_POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: OPERATOR_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: OPERATOR_POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: OPERATOR_POD_SERVICE_ACCOUNT
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.serviceAccountName
            - name: OPERATOR_CONTAINER_CPU_REQUEST
              valueFrom:
                resourceFieldRef:
                  containerName: szlog-clickhouse-operator
                  resource: requests.cpu
                  divisor: '0'
            - name: OPERATOR_CONTAINER_CPU_LIMIT
              valueFrom:
                resourceFieldRef:
                  containerName: szlog-clickhouse-operator
                  resource: limits.cpu
                  divisor: '0'
            - name: OPERATOR_CONTAINER_MEM_REQUEST
              valueFrom:
                resourceFieldRef:
                  containerName: szlog-clickhouse-operator
                  resource: requests.memory
                  divisor: '0'
            - name: OPERATOR_CONTAINER_MEM_LIMIT
              valueFrom:
                resourceFieldRef:
                  containerName: szlog-clickhouse-operator
                  resource: limits.memory
                  divisor: '0'
          resources: {}
          volumeMounts:
            - name: etc-clickhouse-operator-folder
              mountPath: /etc/clickhouse-operator
            - name: etc-clickhouse-operator-confd-folder
              mountPath: /etc/clickhouse-operator/conf.d
            - name: etc-clickhouse-operator-configd-folder
              mountPath: /etc/clickhouse-operator/config.d
            - name: etc-clickhouse-operator-templatesd-folder
              mountPath: /etc/clickhouse-operator/templates.d
            - name: etc-clickhouse-operator-usersd-folder
              mountPath: /etc/clickhouse-operator/users.d
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: szlog-clickhouse-operator
      serviceAccount: szlog-clickhouse-operator
      securityContext: {}
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
