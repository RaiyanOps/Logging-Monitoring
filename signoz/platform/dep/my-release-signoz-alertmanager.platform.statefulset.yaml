kind: StatefulSet
apiVersion: apps/v1
metadata:
  name: szlog-signoz-alertmanager
  namespace: platform
  labels:
    app.kubernetes.io/component: alertmanager
    app.kubernetes.io/instance: szlog
    app.kubernetes.io/name: signoz
    app.kubernetes.io/version: 0.52.0
    helm.sh/chart: signoz-0.50.0
  annotations:
    helm.sh/hook-weight: '4'
    meta.helm.sh/release-name: szlog
    meta.helm.sh/release-namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: alertmanager
      app.kubernetes.io/instance: szlog
      app.kubernetes.io/name: signoz
  template:
    metadata:
      creationTimestamp: null
      labels:
        app.kubernetes.io/component: alertmanager
        app.kubernetes.io/instance: szlog
        app.kubernetes.io/name: signoz
      annotations:
        checksum/config: 01ba4719c80b6fe911b091a7c05124b64eeece964e09c058ef8f9805daca546b
    spec:
      initContainers:
        - name: szlog-signoz-alertmanager-init
          image: 'docker.io/busybox:1.35'
          command:
            - sh
            - '-c'
            - >-
              until wget --spider -q
              szlog-signoz-query-service:8080/api/v1/health?live=1; do echo
              -e "waiting for query-service"; sleep 5; done; echo -e
              "query-service ready, starting alertmanager now";
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      containers:
        - name: alertmanager
          image: 'docker.io/signoz/alertmanager:0.23.5'
          args:
            - '--storage.path=/alertmanager'
            - '--queryService.url=http://szlog-signoz-query-service:8085'
            - '--cluster.advertise-address=$(POD_IP):9094'
          ports:
            - name: http
              containerPort: 9093
              protocol: TCP
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
          volumeMounts:
            - name: storage
              mountPath: /alertmanager
          livenessProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            runAsNonRoot: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: szlog-signoz-alertmanager
      serviceAccount: szlog-signoz-alertmanager
      securityContext:
        fsGroup: 65534
      schedulerName: default-scheduler
  volumeClaimTemplates:
    - kind: PersistentVolumeClaim
      apiVersion: v1
      metadata:
        name: storage
        creationTimestamp: null
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Mi
        volumeMode: Filesystem
      status:
        phase: Pending
  serviceName: szlog-signoz-alertmanager-headless
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  revisionHistoryLimit: 10
