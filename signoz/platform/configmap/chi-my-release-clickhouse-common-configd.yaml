  chop-generated-remote_servers.xml: |
    <yandex>
        <remote_servers>
            <!-- User-specified clusters -->
            <cluster>
                <shard>
                    <internal_replication>False</internal_replication>
                    <replica>
                        <host>chi-szlog-clickhouse-cluster-0-0</host>
                        <port>9000</port>
                        <secure>0</secure>
                    </replica>
                </shard>
            </cluster>
            <!-- Autogenerated clusters -->
            <all-replicated>
                <shard>
                    <internal_replication>true</internal_replication>
                    <replica>
                        <host>chi-szlog-clickhouse-cluster-0-0</host>
                        <port>9000</port>
                        <secure>0</secure>
                    </replica>
                </shard>
            </all-replicated>
            <all-sharded>
                <shard>
                    <internal_replication>false</internal_replication>
                    <replica>
                        <host>chi-szlog-clickhouse-cluster-0-0</host>
                        <port>9000</port>
                        <secure>0</secure>
                    </replica>
                </shard>
            </all-sharded>
        </remote_servers>
    </yandex>
  chop-generated-settings.xml: |
    <yandex>
        <format_schema_path>/etc/clickhouse-server/config.d/</format_schema_path>
        <prometheus>
            <endpoint>/metrics</endpoint>
            <port>9363</port>
        </prometheus>
        <user_defined_executable_functions_config>/etc/clickhouse-server/functions/custom-functions.xml</user_defined_executable_functions_config>
        <user_scripts_path>/var/lib/clickhouse/user_scripts/</user_scripts_path>
    </yandex>
  events.proto: |
    syntax = "proto3";
    message Event {
      string uuid = 1;
      string event = 2;
      string properties = 3;
      string timestamp = 4;
      uint64 team_id = 5;
      string distinct_id = 6;
      string created_at = 7;
      string elements_chain = 8;
    }
        

