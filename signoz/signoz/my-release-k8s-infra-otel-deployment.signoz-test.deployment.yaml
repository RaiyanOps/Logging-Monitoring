kind: Deployment
apiVersion: apps/v1
metadata:
  name: my-release-k8s-infra-otel-deployment
  namespace: signoz
  labels:
    app.kubernetes.io/component: otel-deployment
    app.kubernetes.io/instance: my-release
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: k8s-infra
    app.kubernetes.io/version: 0.88.0
    helm.sh/chart: k8s-infra-0.11.10
  annotations:
    deployment.kubernetes.io/revision: '1'
    meta.helm.sh/release-name: my-release
    meta.helm.sh/release-namespace: signoz
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: otel-deployment
      app.kubernetes.io/instance: my-release
      app.kubernetes.io/name: k8s-infra
  template:
    metadata:
      creationTimestamp: null
      labels:
        app.kubernetes.io/component: otel-deployment
        app.kubernetes.io/instance: my-release
        app.kubernetes.io/name: k8s-infra
      annotations:
        checksum/config: 56848a161f14de10adecbcdf938bc2aba2e2406319f149c7c27c85fa78a9f24c
    spec:
      volumes:
        - name: otel-deployment-config-vol
          configMap:
            name: my-release-k8s-infra-otel-deployment
            defaultMode: 420
      containers:
        - name: my-release-k8s-infra-otel-deployment
          image: 'docker.io/otel/opentelemetry-collector-contrib:0.88.0'
          command:
            - /otelcol-contrib
          args:
            - '--config=/conf/otel-deployment-config.yaml'
          ports:
            - name: health-check
              containerPort: 13133
              protocol: TCP
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: 'szlog-signoz-otel-collector.platform:4317'
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: 'true'
            - name: OTEL_EXPORTER_OTLP_INSECURE_SKIP_VERIFY
              value: 'false'
            - name: OTEL_SECRETS_PATH
              value: /secrets
            - name: K8S_CLUSTER_NAME
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: K8S_POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: K8S_HOST_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.hostIP
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: K8S_POD_UID
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.uid
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: SIGNOZ_COMPONENT
              value: otel-deployment
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: >-
                signoz.component=$(SIGNOZ_COMPONENT),k8s.cluster.name=$(K8S_CLUSTER_NAME)
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
          volumeMounts:
            - name: otel-deployment-config-vol
              mountPath: /conf
          livenessProbe:
            httpGet:
              path: /
              port: 13133
              scheme: HTTP
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: 13133
              scheme: HTTP
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 6
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: my-release-k8s-infra-otel-deployment
      serviceAccount: my-release-k8s-infra-otel-deployment
      securityContext: {}
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  minReadySeconds: 5
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 120
