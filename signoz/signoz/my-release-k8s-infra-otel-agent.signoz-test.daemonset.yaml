kind: DaemonSet
apiVersion: apps/v1
metadata:
  name: my-release-k8s-infra-otel-agent
  namespace: signoz
  labels:
    app.kubernetes.io/component: otel-agent
    app.kubernetes.io/instance: my-release
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: k8s-infra
    app.kubernetes.io/version: 0.88.0
    helm.sh/chart: k8s-infra-0.11.10
  annotations:
    deprecated.daemonset.template.generation: '1'
    meta.helm.sh/release-name: my-release
    meta.helm.sh/release-namespace: signoz
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: otel-agent
      app.kubernetes.io/instance: my-release
      app.kubernetes.io/name: k8s-infra
  template:
    metadata:
      creationTimestamp: null
      labels:
        app.kubernetes.io/component: otel-agent
        app.kubernetes.io/instance: my-release
        app.kubernetes.io/name: k8s-infra
      annotations:
        checksum/config: dc63be437e059e1dee3816be5e48d9658b6cdd134c095e2ea6a90fd9c4d2bc8e
    spec:
      volumes:
        - name: otel-agent-config-vol
          configMap:
            name: my-release-k8s-infra-otel-agent
            defaultMode: 420
        - name: varlog
          hostPath:
            path: /var/log
            type: ''
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
            type: ''
        - name: hostfs
          hostPath:
            path: /
            type: ''
      containers:
        - name: my-release-k8s-infra-otel-agent
          image: 'docker.io/otel/opentelemetry-collector-contrib:0.88.0'
          command:
            - /otelcol-contrib
          args:
            - '--config=/conf/otel-agent-config.yaml'
          ports:
            - name: health-check
              hostPort: 13133
              containerPort: 13133
              protocol: TCP
            - name: metrics
              hostPort: 8888
              containerPort: 8888
              protocol: TCP
            - name: otlp
              hostPort: 4317
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              hostPort: 4318
              containerPort: 4318
              protocol: TCP
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: 'szlog-signoz-otel-collector.platform:4317'
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: 'true'
            - name: OTEL_EXPORTER_OTLP_INSECURE_SKIP_VERIFY
              value: 'false'
            - name: OTEL_SECRETS_PATH
              value: /secrets
            - name: K8S_CLUSTER_NAME
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: K8S_POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: K8S_HOST_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.hostIP
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: K8S_POD_UID
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.uid
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: SIGNOZ_COMPONENT
              value: otel-agent
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: >-
                signoz.component=$(SIGNOZ_COMPONENT),k8s.cluster.name=$(K8S_CLUSTER_NAME),k8s.pod.uid=$(K8S_POD_UID),k8s.pod.ip=$(K8S_POD_IP)
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
          volumeMounts:
            - name: otel-agent-config-vol
              mountPath: /conf
            - name: varlog
              readOnly: true
              mountPath: /var/log
            - name: varlibdockercontainers
              readOnly: true
              mountPath: /var/lib/docker/containers
            - name: hostfs
              readOnly: true
              mountPath: /hostfs
              mountPropagation: HostToContainer
          livenessProbe:
            httpGet:
              path: /
              port: 13133
              scheme: HTTP
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: 13133
              scheme: HTTP
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 6
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: my-release-k8s-infra-otel-agent
      serviceAccount: my-release-k8s-infra-otel-agent
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      schedulerName: default-scheduler
      tolerations:
        - operator: Exists
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  minReadySeconds: 5
  revisionHistoryLimit: 10
